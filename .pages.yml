media:
  input: public/images
  output: /images

content:

  # ─────────────────────────────────────────────────────────────────────────────
  # WORK — Individual case studies and client projects
  # ─────────────────────────────────────────────────────────────────────────────
  - name: work
    label: Work
    type: folder
    path: content/work
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Project Title
        type: string
      - name: id
        label: Slug / ID
        type: string
        description: "Unique identifier, e.g. my-project."
      - name: order
        label: Sort Order
        type: number
        description: "Lower numbers appear first (0, 1, 2...)"
      - name: role
        label: Your Role
        type: string
      - name: description
        label: Short Excerpt
        type: text
      - name: categories
        label: Disciplines / Tags
        type: list
        label_field: value
        fields: [{ name: value, label: Tag, type: string }]
      - name: image
        label: Main Image
        type: image
      - name: link
        label: Live Project URL
        type: string
      - name: isFullBleed
        label: Full-width in grid
        type: boolean
      - name: details
        label: Case Study Panels
        type: list
        label_field: heading
        fields:
          - name: heading
            label: Heading
            type: string
          - name: text
            label: Body Text
            type: text
          - name: image
            label: Image
            type: image

  # ─────────────────────────────────────────────────────────────────────────────
  # UPDATES — News, talks, launches
  # ─────────────────────────────────────────────────────────────────────────────
  - name: updates_news
    label: Updates
    type: folder
    path: content/updates
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Update Title
        type: string
      - name: id
        label: Slug / ID
        type: string
      - name: order
        label: Sort Order
        type: number
        description: "Lower numbers appear first."
      - name: date
        label: Date Label
        type: string
        description: "e.g. April 2026"
      - name: description
        label: Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
      - name: content
        label: Body Paragraphs
        type: list
        label_field: value
        fields: [{ name: value, label: Paragraph, type: text }]

  # ─────────────────────────────────────────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: home
    label: Home Page Settings
    type: file
    path: content/home.json
    format: json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: headline
            label: Headline
            type: text
          - name: description
            label: Description
            type: text
      - name: labels
        label: Section Headings
        type: object
        fields:
          - name: heroCta
            label: Hero CTA Button
            type: string
          - name: workSectionHeading
            label: Work Heading
            type: string
          - name: updatesSectionHeading
            label: Updates Heading
            type: string
          - name: infoSectionHeading
            label: Info Heading
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # INFO PAGE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: info
    label: Info Page Profile
    type: file
    path: content/info.json
    format: json
    fields:
      - name: about
        label: Profile
        type: object
        fields:
          - name: name
            label: Full Name
            type: string
          - name: role
            label: Role / Title
            type: string
          - name: imageUrl
            label: Image
            type: image
          - name: about
            label: Bio Paragraphs
            type: list
            label_field: value
            fields: [{ name: value, label: Paragraph, type: text }]
      - name: operatingModels
        label: Operating Model List
        type: list
        label_field: title
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
      - name: focusAreas
        label: Focus Areas List
        type: list
        label_field: title
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
      - name: speaking
        label: Speaking & Mentorship
        type: object
        fields:
          - name: description
            label: Section Desc
            type: text
          - name: engagements
            label: Engagements
            type: list
            label_field: title
            fields:
              - name: title
                label: Title
                type: string
              - name: year
                label: Year
                type: string
              - name: role
                label: Role
                type: string
              - name: description
                label: Details
                type: text
              - name: link
                label: URL
                type: string
      - name: contact
        label: Contact Section
        type: object
        fields:
          - name: headline
            label: Headline
            type: text
          - name: description
            label: Subheading
            type: text
          - name: email
            label: Email
            type: string
          - name: location
            label: Location
            type: string
      - name: labels
        label: Section Headings
        type: object
        fields:
          - name: operatingModelHeading
            label: Operating Model Title
            type: string
          - name: focusAreasHeading
            label: Focus Areas Title
            type: string
          - name: speakingHeading
            label: Speaking Title
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # SITE SETTINGS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: site_settings
    label: Global Site Settings
    type: file
    path: content/settings.json
    format: json
    fields:
      - name: metadata
        label: SEO and Site Data
        type: object
        fields:
          - name: siteTitle
            label: Site Title
            type: string
          - name: faviconEmoji
            label: Favicon Emoji
            type: string
          - name: faviconImage
            label: Favicon Image
            type: image
          - name: seoDescription
            label: SEO Description
            type: text
          - name: seoKeywords
            label: SEO Keywords
            type: string
          - name: ogImage
            label: Share Image
            type: image
          - name: headScripts
            label: Custom Scripts (gTag, etc.)
            type: text
      - name: navigation
        label: Navigation Menu
        type: object
        fields:
          - name: logoText
            label: Logo Text
            type: string
          - name: items
            label: Menu Items
            type: list
            label_field: label
            fields:
              - name: label
                label: Link Label
                type: string
              - name: url
                label: Target URL
                type: string
      - name: socialLinks
        label: Social Media Profiles
        type: list
        label_field: name
        fields:
          - name: name
            label: Platform Name
            type: string
          - name: url
            label: Full URL
            type: string
      - name: footer
        label: Global Footer
        type: object
        fields:
          - name: footerCopyright
            label: Copyright Name
            type: string
          - name: footerTagline
            label: Brand Tagline
            type: string
      - name: themeColors
        label: Visual Themes
        type: object
        fields:
          - name: morning
            label: Morning Mode
            type: object
            fields:
              - { name: bg, label: Background Color, type: color }
              - { name: fg, label: Text Color, type: color }
              - { name: muted, label: Muted Text Color, type: color }
              - { name: border, label: Border Color, type: color }
          - name: noon
            label: Noon Mode
            type: object
            fields:
              - { name: bg, label: Background Color, type: color }
              - { name: fg, label: Text Color, type: color }
              - { name: muted, label: Muted Text Color, type: color }
              - { name: border, label: Border Color, type: color }
          - name: evening
            label: Evening Mode
            type: object
            fields:
              - { name: bg, label: Background Color, type: color }
              - { name: fg, label: Text Color, type: color }
              - { name: muted, label: Muted Text Color, type: color }
              - { name: border, label: Border Color, type: color }
      - name: typography
        label: Site Typography
        type: object
        fields:
          - name: bodyFontUrl
            label: Google Font URL
            type: string
          - name: bodyFontFamily
            label: Serif/Sans Font Name
            type: string
          - name: monoFontFamily
            label: Monospace Font Name
            type: string
      - name: layout
        label: Display & Pagination
        type: object
        fields:
          - name: workItemsPerPage
            label: Max Work in Grid
            type: number
          - name: updatesItemsPerPage
            label: Max Updates in Grid
            type: number
      - name: clock
        label: World Clock Config
        type: object
        fields:
          - name: locale
            label: Date Locale
            type: string
          - name: hour12
            label: Use 12h Clock
            type: boolean
          - name: timezone
            label: Theme TZ
            type: string
      - name: uiLabels
        label: Global UI Translations
        type: object
        fields:
          - { name: loadMore, label: Load More Label, type: string }
          - { name: showLess, label: Show Less Label, type: string }
          - { name: backToTop, label: Back to Top Label, type: string }
          - { name: visitProject, label: Visit Project Label, type: string }
          - { name: discussProject, label: Discuss Project Label, type: string }
          - { name: filterLabel, label: Filter Menu Title, type: string }
          - { name: filterByLabel, label: Filter Category Heading, type: string }
          - { name: sidebarEnvironment, label: Mode Tab Label, type: string }
          - { name: sidebarVisuals, label: Visuals Tab Label, type: string }
          - { name: sidebarLayout, label: Layout Tab Label, type: string }
          - { name: sidebarAcoustics, label: Sound Tab Label, type: string }
          - { name: sidebarNetwork, label: Network (TBC) Label, type: string }
