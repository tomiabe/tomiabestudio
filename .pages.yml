media:
  input: public/images
  output: /images

content:

  # ─────────────────────────────────────────────────────────────────────────────
  # WORK — Individual case studies and client projects
  # ─────────────────────────────────────────────────────────────────────────────
  - name: work
    label: Work
    type: folder
    path: content/work
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Project Title
        type: string
      - name: id
        label: Slug / ID
        type: string
        description: "Unique identifier, e.g. my-project."
      - name: order
        label: Sort Order
        type: number
        description: "Lower numbers appear first (0, 1, 2...)"
      - name: role
        label: Your Role
        type: string
      - name: description
        label: Short Excerpt
        type: text
      - name: categories
        label: Disciplines / Tags
        type: list
        label_field: value
        fields: [{ name: value, label: Tag, type: string }]
      - name: image
        label: Main Image
        type: image
      - name: link
        label: Live Project URL
        type: string
        description: "Optional link to the external site."
      - name: isFullBleed
        label: Full-width in grid
        type: boolean
      - name: details
        label: Case Study Panels
        type: list
        label_field: heading
        fields:
          - name: heading
            label: Section Heading
            type: string
          - name: text
            label: Section Body Text
            type: text
          - name: image
            label: Section Image
            type: image

  # ─────────────────────────────────────────────────────────────────────────────
  # UPDATES — News, talks, launches
  # ─────────────────────────────────────────────────────────────────────────────
  - name: updates_news
    label: Updates
    type: folder
    path: content/updates
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Update Title
        type: string
      - name: id
        label: Slug / ID
        type: string
      - name: order
        label: Sort Order
        type: number
      - name: date
        label: Date Label
        type: string
        description: "e.g. April 2026"
      - name: description
        label: Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
      - name: content
        label: Body Paragraphs
        type: list
        label_field: value
        fields: [{ name: value, label: Paragraph, type: text }]

  # ─────────────────────────────────────────────────────────────────────────────
  # HOME PAGE SETTINGS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: home
    label: Home Page Settings
    type: file
    path: content/home.json
    format: json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: headline
            label: Headline
            type: text
          - name: description
            label: Description
            type: text
      - name: labels
        label: Section Headings
        type: object
        fields:
          - name: heroCta
            label: Hero CTA Label
            type: string
          - name: workSectionHeading
            label: Work Feed Title
            type: string
          - name: updatesSectionHeading
            label: Updates Feed Title
            type: string
          - name: infoSectionHeading
            label: Info Section Title
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # INFO PAGE PROFILE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: info
    label: Studio Info & Bio
    type: file
    path: content/info.json
    format: json
    fields:
      - name: about
        label: Profile Information
        type: object
        fields:
          - name: name
            label: Full Name
            type: string
          - name: role
            label: Role / Title
            type: string
          - name: imageUrl
            label: Profile Picture
            type: image
          - name: about
            label: Bio Paragraphs
            type: list
            label_field: value
            fields: [{ name: value, label: Text, type: text }]
      - name: operatingModels
        label: Operating Models
        type: list
        label_field: title
        fields:
          - name: title
            label: Model Title
            type: string
          - name: description
            label: Model Description
            type: text
      - name: focusAreas
        label: Strategic Focus Areas
        type: list
        label_field: title
        fields:
          - name: title
            label: Area Title
            type: string
          - name: description
            label: Area Description
            type: text
      - name: speaking
        label: Speaking & Mentorship
        type: object
        fields:
          - name: description
            label: Section Intro Text
            type: text
          - name: engagements
            label: Past Engagements
            type: list
            label_field: title
            fields:
              - name: title
                label: Event/Platform Title
                type: string
              - name: year
                label: Year
                type: string
              - name: role
                label: Your Role
                type: string
              - name: description
                label: Engagement Details
                type: text
              - name: link
                label: External Link
                type: string
      - name: contact
        label: Contact Details
        type: object
        fields:
          - name: headline
            label: Contact Headline
            type: text
          - name: description
            label: Contact Description
            type: text
          - name: email
            label: Public Email Address
            type: string
          - name: location
            label: Studio Location
            type: string
      - name: labels
        label: Layout Labels
        type: object
        fields:
          - name: operatingModelHeading
            label: Models Section Heading
            type: string
          - name: focusAreasHeading
            label: Focus Areas Section Heading
            type: string
          - name: speakingHeading
            label: Speaking Section Heading
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # SITE SETTINGS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: site_settings
    label: Global Website Settings
    type: file
    path: content/settings.json
    format: json
    fields:
      - name: metadata
        label: SEO and Site Data
        type: object
        fields:
          - name: siteTitle
            label: Site Title
            type: string
          - name: faviconEmoji
            label: Favicon Emoji
            type: string
          - name: faviconImage
            label: Favicon Image
            type: image
          - name: seoDescription
            label: SEO Description
            type: text
          - name: seoKeywords
            label: SEO Keywords
            type: string
          - name: ogImage
            label: Share Image
            type: image
          - name: headScripts
            label: Custom Scripts (gTag, etc.)
            type: text
      - name: navigation
        label: Navigation Menu
        type: object
        fields:
          - name: logoText
            label: Logo Text
            type: string
          - name: items
            label: Menu Links
            type: list
            label_field: label
            fields:
              - name: label
                label: Link Label
                type: string
              - name: url
                label: Target URL
                type: string
      - name: socialLinks
        label: Social Media Profiles
        type: list
        label_field: name
        fields:
          - name: name
            label: Platform Name
            type: string
          - name: url
            label: Full URL
            type: string
      - name: footer
        label: Global Footer
        type: object
        fields:
          - name: footerCopyright
            label: Copyright Owner
            type: string
          - name: footerTagline
            label: Brand Tagline
            type: string
      - name: themeColors
        label: Color Themes
        type: object
        fields:
          - name: morning
            label: Morning (Warm)
            type: object
            fields:
              - { name: bg, label: Background, type: color }
              - { name: fg, label: Text, type: color }
              - { name: muted, label: Muted, type: color }
              - { name: border, label: Border, type: color }
          - name: noon
            label: Noon (Clean)
            type: object
            fields:
              - { name: bg, label: Background, type: color }
              - { name: fg, label: Text, type: color }
              - { name: muted, label: Muted, type: color }
              - { name: border, label: Border, type: color }
          - name: evening
            label: Evening (Dark)
            type: object
            fields:
              - { name: bg, label: Background, type: color }
              - { name: fg, label: Text, type: color }
              - { name: muted, label: Muted, type: color }
              - { name: border, label: Border, type: color }
      - name: typography
        label: Site-wide Typography
        type: object
        fields:
          - name: bodyFontUrl
            label: Google Font URL
            type: string
          - name: bodyFontFamily
            label: Body Font Family
            type: string
          - name: monoFontFamily
            label: Mono Font Family
            type: string
      - name: layout
        label: Feed Display Settings
        type: object
        fields:
          - name: workItemsPerPage
            label: Projects to show initially
            type: number
          - name: updatesItemsPerPage
            label: Updates to show initially
            type: number
      - name: clock
        label: Clock & Time Settings
        type: object
        fields:
          - name: locale
            label: Formatting Locale
            type: string
          - name: hour12
            label: 12-hour Display
            type: boolean
          - name: timezone
            label: Timezone Descriptor
            type: string
      - name: uiLabels
        label: Interface Labels (Translation)
        type: object
        fields:
          - { name: loadMore, label: Load More, type: string }
          - { name: showLess, label: Show Less, type: string }
          - { name: backToTop, label: Back to Top, type: string }
          - { name: visitProject, label: Visit Project, type: string }
          - { name: discussProject, label: Discuss Project, type: string }
          - { name: filterLabel, label: Filter Menu, type: string }
          - { name: filterByLabel, label: Filter By Heading, type: string }
          - { name: sidebarEnvironment, label: Mode Tab, type: string }
          - { name: sidebarVisuals, label: Visuals Tab, type: string }
          - { name: sidebarLayout, label: Layout Tab, type: string }
          - { name: sidebarAcoustics, label: Sound Tab, type: string }
          - { name: sidebarNetwork, label: Network Tab, type: string }
