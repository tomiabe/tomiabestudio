media:
  input: public/images
  output: /images

content:

  # ─────────────────────────────────────────────────────────────────────────────
  # WORK — Individual case studies and client projects
  # ─────────────────────────────────────────────────────────────────────────────
  - name: work
    label: Work
    type: collection
    path: content/work
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Project Title
        type: string
      - name: id
        label: Slug / ID
        type: string
        description: "Unique identifier, e.g. my-project."
      - name: order
        label: Sort Order
        type: number
      - name: role
        label: Your Role
        type: string
      - name: description
        label: Short Excerpt
        type: text
      - name: categories
        label: Disciplines / Tags
        type: list
        label_field: value
        fields: [{ name: value, label: Tag, type: string }]
      - name: image
        label: Main Image
        type: image
      - name: link
        label: Live Project URL
        type: string
      - name: isFullBleed
        label: Full-width in grid
        type: boolean
      - name: details
        label: Case Study Panels
        type: list
        label_field: heading
        fields:
          - name: heading
            label: Panel Heading
            type: string
          - name: text
            label: Panel Text
            type: text
          - name: image
            label: Panel Image
            type: image

  # ─────────────────────────────────────────────────────────────────────────────
  # UPDATES — News, talks, launches
  # ─────────────────────────────────────────────────────────────────────────────
  - name: updates_news
    label: Updates
    type: collection
    path: content/updates
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Update Title
        type: string
      - name: id
        label: Slug / ID
        type: string
      - name: order
        label: Sort Order
        type: number
      - name: date
        label: Date Label
        type: string
      - name: description
        label: Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
      - name: content
        label: Body Paragraphs
        type: list
        label_field: value
        fields: [{ name: value, label: Paragraph, type: text }]

  # ─────────────────────────────────────────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: home
    label: Home
    type: file
    path: content/home.json
    format: json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: headline
            label: Headline
            type: text
          - name: description
            label: Description
            type: text
      - name: labels
        label: Content Labels
        type: object
        fields:
          - name: heroCta
            label: Hero CTA Button
            type: string
          - name: workSectionHeading
            label: Work Heading
            type: string
          - name: updatesSectionHeading
            label: Updates Heading
            type: string
          - name: infoSectionHeading
            label: Info Heading
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # INFO PAGE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: info
    label: Info
    type: file
    path: content/info.json
    format: json
    fields:
      - name: about
        label: Studio Profile
        type: object
        fields:
          - name: name
            label: Name
            type: string
          - name: role
            label: Title
            type: string
          - name: imageUrl
            label: Profile Photo
            type: image
          - name: lead
            label: Core Statement (First line)
            type: text
          - name: bio
            label: Main Bio (Supports Styles)
            type: markdown
      - name: operatingModels
        label: Operating Models
        type: list
        label_field: title
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
      - name: focusAreas
        label: Focus Areas
        type: list
        label_field: title
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
      - name: speaking
        label: Speaking & Mentorship
        type: object
        fields:
          - name: description
            label: Section Intro
            type: text
          - name: engagements
            label: Selected Engagements
            type: list
            label_field: title
            fields:
              - name: title
                label: Platform/Event
                type: string
              - name: year
                label: Year
                type: string
              - name: role
                label: Your Role
                type: string
              - name: description
                label: Details
                type: text
              - name: link
                label: Link
                type: string
      - name: contact
        label: Contact
        type: object
        fields:
          - name: headline
            label: Headline
            type: text
          - name: description
            label: Text
            type: text
          - name: email
            label: Email
            type: string
          - name: location
            label: Location
            type: string
      - name: labels
        label: Section Headings
        type: object
        fields:
          - name: operatingModelHeading
            label: Operating Model Title
            type: string
          - name: focusAreasHeading
            label: Focus Areas Title
            type: string
          - name: speakingHeading
            label: Speaking Title
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # SETTINGS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: site_settings
    label: Settings
    type: file
    path: content/settings.json
    format: json
    fields:
      - name: metadata
        label: Site SEO
        type: object
        fields:
          - name: siteTitle
            label: Browser Title
            type: string
          - name: faviconEmoji
            label: Favicon Emoji
            type: string
          - name: faviconImage
            label: Favicon Image
            type: image
          - name: seoDescription
            label: SEO Meta Desc
            type: text
          - name: seoKeywords
            label: SEO Keywords
            type: string
          - name: ogImage
            label: Share Image
            type: image
          - name: headScripts
            label: Scripts (GA, etc.)
            type: text
      - name: navigation
        label: Navigation Menu
        type: object
        fields:
          - name: logoText
            label: Logo Text
            type: string
          - name: items
            label: Link List
            type: list
            label_field: label
            fields:
              - name: label
                label: Label
                type: string
              - name: url
                label: URL
                type: string
      - name: socialLinks
        label: Social
        type: list
        label_field: name
        fields:
          - name: name
            label: Network
            type: string
          - name: url
            label: Link
            type: string
      - name: themeColors
        label: Theme Presets
        type: object
        fields:
          - name: morning
            label: Morning
            type: object
            fields:
              - { name: bg, label: BG, type: color }
              - { name: fg, label: FG, type: color }
              - { name: muted, label: Muted, type: color }
              - { name: border, label: Border, type: color }
          - name: noon
            label: Noon
            type: object
            fields:
              - { name: bg, label: BG, type: color }
              - { name: fg, label: FG, type: color }
              - { name: muted, label: Muted, type: color }
              - { name: border, label: Border, type: color }
          - name: evening
            label: Evening
            type: object
            fields:
              - { name: bg, label: BG, type: color }
              - { name: fg, label: FG, type: color }
              - { name: muted, label: Muted, type: color }
              - { name: border, label: Border, type: color }
      - name: typography
        label: Fonts
        type: object
        fields:
          - name: bodyFontUrl
            label: Google Font URL
            type: string
          - name: bodyFontFamily
            label: Body Font Name
            type: string
          - name: monoFontFamily
            label: Mono Font Name
            type: string
      - name: layout
        label: Pagination
        type: object
        fields:
          - name: workItemsPerPage
            label: Work Threshold
            type: number
          - name: updatesItemsPerPage
            label: Updates Threshold
            type: number
      - name: clock
        label: Clock
        type: object
        fields:
          - name: locale
            label: Locale
            type: string
          - name: hour12
            label: 12-hour
            type: boolean
          - name: timezone
            label: Timezone Name
            type: string
      - name: uiLabels
        label: UI Translations
        type: object
        fields:
          - { name: loadMore, label: Load More, type: string }
          - { name: showLess, label: Show Less, type: string }
          - { name: backToTop, label: Back to Top, type: string }
          - { name: visitProject, label: Visit Project, type: string }
          - { name: discussProject, label: Discuss Project, type: string }
          - { name: filterLabel, label: Filter Menu, type: string }
          - { name: filterByLabel, label: Filter Category, type: string }
          - { name: sidebarEnvironment, label: Mode Tab, type: string }
          - { name: sidebarVisuals, label: Visuals Tab, type: string }
          - { name: sidebarLayout, label: Layout Tab, type: string }
          - { name: sidebarAcoustics, label: Sound Tab, type: string }
          - { name: sidebarNetwork, label: Network Tab, type: string }
