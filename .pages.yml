media:
  input: public/images
  output: /images

content:

  # ─────────────────────────────────────────────────────────────────────────────
  # WORK — Individual case studies and client projects
  # ─────────────────────────────────────────────────────────────────────────────
  - name: work
    label: Work
    type: collection
    path: content/work
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Project Title
        type: string
      - name: id
        label: Slug / ID
        type: string
        description: "Unique identifier, e.g. my-project."
      - name: order
        label: Sort Order
        type: number
      - name: visible
        label: Show on Site
        type: boolean
      - name: role
        label: Your Role
        type: string
      - name: description
        label: Short Excerpt
        type: text
      - name: categories
        label: Disciplines / Tags
        type: select
        options:
          multiple: true
          creatable: true
          values: [Art, Brand, Content, Data, Product]
      - name: image
        label: Main Image
        type: image
      - name: link
        label: Live Project URL
        type: string
      - name: isFullBleed
        label: Full-width in grid
        type: boolean
      - name: details
        label: Case Study Panels
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{heading}"
        fields:
          - name: heading
            label: Panel Heading
            type: string
          - name: text
            label: Panel Text
            type: rich-text
            options:
              format: html
          - name: image
            label: Panel Image
            type: image

  # ─────────────────────────────────────────────────────────────────────────────
  # UPDATES — News, talks, launches
  # ─────────────────────────────────────────────────────────────────────────────
  - name: updates_news
    label: Updates
    type: collection
    path: content/updates
    format: json
    extension: json
    create: true
    delete: true
    identifier_field: id
    label_field: title
    fields:
      - name: title
        label: Update Title
        type: string
      - name: id
        label: Slug / ID
        type: string
      - name: order
        label: Sort Order
        type: number
      - name: visible
        label: Show on Site
        type: boolean
      - name: date
        label: Date Label
        type: string
      - name: description
        label: Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
      - name: link
        label: External Link URL
        type: string
      - name: directLink
        label: Open Direct Link
        type: boolean
        description: "When enabled, this update card opens the link in a new tab instead of the drawer."
      - name: content
        label: Body
        type: rich-text
        options:
          format: html

  # ─────────────────────────────────────────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: home
    label: Home
    type: file
    path: content/home.json
    format: json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: headline
            label: Headline
            type: rich-text
            options:
              format: html
          - name: description
            label: Description
            type: rich-text
            options:
              format: html
      - name: labels
        label: Content Labels
        type: object
        fields:
          - name: heroCta
            label: Hero CTA Button
            type: string
          - name: heroCta2
            label: Hero Secondary Button Label
            type: string
            description: "Leave blank to hide the second button"
          - name: heroCta2Url
            label: Hero Secondary Button URL
            type: string
            description: "Link for the second button (e.g. https://read.cv/tomiabe)"
          - name: workSectionHeading
            label: Work Heading
            type: string
          - name: updatesSectionHeading
            label: Updates Heading
            type: string
          - name: infoSectionHeading
            label: Info Heading
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # INFO PAGE
  # ─────────────────────────────────────────────────────────────────────────────
  - name: info
    label: Info
    type: file
    path: content/info.json
    format: json
    fields:
      - name: about
        label: Studio Profile
        type: object
        fields:
          - name: name
            label: Name
            type: string
          - name: role
            label: Title
            type: string
          - name: imageUrl
            label: Profile Photo
            type: image
          - name: lead
            label: Core Statement (First line)
            type: rich-text
            options:
              format: html
          - name: bio
            label: Main Bio
            type: rich-text
            options:
              format: html
      - name: operatingModels
        label: Operating Models
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: rich-text
            options:
              format: html
      - name: focusAreas
        label: Focus Areas
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: rich-text
            options:
              format: html
      - name: speaking
        label: Speaking & Mentorship
        type: object
        fields:
          - name: description
            label: Section Intro
            type: rich-text
            options:
              format: html
          - name: engagements
            label: Selected Engagements
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{title} ({year})"
            fields:
              - name: title
                label: Platform/Event
                type: string
              - name: year
                label: Year
                type: string
              - name: role
                label: Your Role
                type: string
              - name: description
                label: Details
                type: rich-text
                options:
                  format: html
              - name: link
                label: Link
                type: string
              - name: ctaLabel
                label: Button Label
                type: string
      - name: contact
        label: Contact
        type: object
        fields:
          - name: headline
            label: Headline
            type: rich-text
            options:
              format: html
          - name: description
            label: Text
            type: rich-text
            options:
              format: html
          - name: email
            label: Email
            type: string
          - name: location
            label: Location
            type: string
      - name: labels
        label: Section Headings
        type: object
        fields:
          - name: operatingModelHeading
            label: Operating Model Title
            type: string
          - name: focusAreasHeading
            label: Focus Areas Title
            type: string
          - name: speakingHeading
            label: Speaking Title
            type: string

  # ─────────────────────────────────────────────────────────────────────────────
  # SETTINGS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: site_settings
    label: Settings
    type: file
    path: content/settings.json
    format: json
    fields:
      - name: metadata
        label: Site SEO
        type: object
        fields:
          - name: siteTitle
            label: Browser Title
            type: string
          - name: faviconEmoji
            label: Favicon Emoji
            type: string
          - name: faviconImage
            label: Favicon Image
            type: image
          - name: seoDescription
            label: SEO Meta Desc
            type: text
          - name: seoKeywords
            label: SEO Keywords
            type: string
          - name: ogImage
            label: Share Image
            type: image
          - name: headScripts
            label: Scripts (GA, etc.)
            type: text
      - name: navigation
        label: Navigation Menu
        type: object
        fields:
          - name: logoText
            label: Logo Text
            type: string
          - name: items
            label: Link List
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label}"
            fields:
              - name: label
                label: Label
                type: string
              - name: url
                label: URL
                type: string
      - name: socialLinks
        label: Social
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - name: name
            label: Network
            type: string
          - name: url
            label: Link
            type: string
      - name: workFilters
        label: Work Filters
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - name: name
            label: Filter Name
            type: string
      - name: workCardStyle
        label: Work Card Style
        type: select
        options:
          choices:
            - value: row
              label: "Row (image left, details right)"
            - value: immersive
              label: "Immersive (full-bleed overlay)"
      - name: workCardOverlay
        label: Work Card Overlay
        type: object
        fields:
          - name: baseOpacity
            label: Base Opacity (0–1)
            type: number
            options:
              min: 0
              max: 1
              step: 0.05
          - name: hoverOpacity
            label: Hover Opacity (0–1)
            type: number
            options:
              min: 0
              max: 1
              step: 0.05
      - name: themeColors
        label: Theme Colors
        type: object
        fields:
          - name: morning
            label: "☀️ Morning"
            type: object
            fields:
              - name: bg
                label: Background
                type: string
                options:
                  input: color
              - name: fg
                label: Foreground (Text)
                type: string
                options:
                  input: color
              - name: muted
                label: Muted Text
                type: string
                options:
                  input: color
              - name: border
                label: Borders
                type: string
                options:
                  input: color
          - name: noon
            label: "🌤 Noon"
            type: object
            fields:
              - name: bg
                label: Background
                type: string
                options:
                  input: color
              - name: fg
                label: Foreground (Text)
                type: string
                options:
                  input: color
              - name: muted
                label: Muted Text
                type: string
                options:
                  input: color
              - name: border
                label: Borders
                type: string
                options:
                  input: color
          - name: evening
            label: "🌙 Evening"
            type: object
            fields:
              - name: bg
                label: Background
                type: string
                options:
                  input: color
              - name: fg
                label: Foreground (Text)
                type: string
                options:
                  input: color
              - name: muted
                label: Muted Text
                type: string
                options:
                  input: color
              - name: border
                label: Borders
                type: string
                options:
                  input: color
      - name: typography
        label: Fonts
        type: object
        fields:
          - name: bodyFontUrl
            label: Google Font URL
            type: string
          - name: bodyFontFamily
            label: Body Font Name
            type: string
          - name: monoFontFamily
            label: Mono Font Name
            type: string

          # ── Navigation ────────────────────────────────────
          - name: navLogoPx
            label: "Nav: Logo — Desktop (px)"
            type: number
          - name: navLogoMobilePx
            label: "Nav: Logo — Mobile (px)"
            type: number
          - name: navLinkPx
            label: "Nav: Links — Desktop (px)"
            type: number
          - name: mobileMenuItemPx
            label: "Nav: Mobile Menu Items (px)"
            type: number

          # ── Hero ──────────────────────────────────────────
          - name: heroTitlePx
            label: "Hero: Title — Desktop (px)"
            type: number
          - name: heroTitleTabletPx
            label: "Hero: Title — Tablet (px)"
            type: number
          - name: heroTitleMobilePx
            label: "Hero: Title — Mobile (px)"
            type: number
          - name: heroDescriptionPx
            label: "Hero: Description — Desktop (px)"
            type: number
          - name: heroDescriptionTabletPx
            label: "Hero: Description — Tablet (px)"
            type: number
          - name: heroDescriptionMobilePx
            label: "Hero: Description — Mobile (px)"
            type: number
          - name: heroCtaPx
            label: "Hero: Button — Desktop (px)"
            type: number
          - name: heroCtaMobilePx
            label: "Hero: Button — Mobile (px)"
            type: number

          # ── Section Headings ──────────────────────────────
          - name: sectionHeadingPx
            label: "Section Heading — Desktop (px)"
            type: number
          - name: sectionHeadingMobilePx
            label: "Section Heading — Mobile (px)"
            type: number

          # ── Work Cards ────────────────────────────────────
          - name: workCardTitlePx
            label: "Work Card: Title — Desktop (px)"
            type: number
          - name: workCardTitleTabletPx
            label: "Work Card: Title — Tablet (px)"
            type: number
          - name: workCardTitleMobilePx
            label: "Work Card: Title — Mobile (px)"
            type: number
          - name: workCardExcerptPx
            label: "Work Card: Excerpt — Desktop (px)"
            type: number
          - name: workCardExcerptMobilePx
            label: "Work Card: Excerpt — Mobile (px)"
            type: number

          # ── Updates Cards ─────────────────────────────────
          - name: updatesCardDatePx
            label: "Updates Card: Date — Desktop (px)"
            type: number
          - name: updatesCardDateMobilePx
            label: "Updates Card: Date — Mobile (px)"
            type: number
          - name: updatesCardTitlePx
            label: "Updates Card: Title — Desktop (px)"
            type: number
          - name: updatesCardTitleMobilePx
            label: "Updates Card: Title — Mobile (px)"
            type: number
          - name: updatesCardExcerptPx
            label: "Updates Card: Excerpt — Desktop (px)"
            type: number
          - name: updatesCardExcerptMobilePx
            label: "Updates Card: Excerpt — Mobile (px)"
            type: number

          # ── Updates Drawer ────────────────────────────────
          - name: updatesDrawerDatePx
            label: "Updates Drawer: Date — Desktop (px)"
            type: number
          - name: updatesDrawerDateMobilePx
            label: "Updates Drawer: Date — Mobile (px)"
            type: number
          - name: updatesDrawerTitlePx
            label: "Updates Drawer: Title — Desktop (px)"
            type: number
          - name: updatesDrawerTitleTabletPx
            label: "Updates Drawer: Title — Tablet (px)"
            type: number
          - name: updatesDrawerTitleMobilePx
            label: "Updates Drawer: Title — Mobile (px)"
            type: number
          - name: updatesDrawerExcerptPx
            label: "Updates Drawer: Excerpt — Desktop (px)"
            type: number
          - name: updatesDrawerExcerptMobilePx
            label: "Updates Drawer: Excerpt — Mobile (px)"
            type: number
          - name: updatesDrawerBodyPx
            label: "Updates Drawer: Body — Desktop (px)"
            type: number
          - name: updatesDrawerBodyMobilePx
            label: "Updates Drawer: Body — Mobile (px)"
            type: number

          # ── Info Section ──────────────────────────────────
          - name: infoNamePx
            label: "Info: Name — Desktop (px)"
            type: number
          - name: infoNameMobilePx
            label: "Info: Name — Mobile (px)"
            type: number
          - name: infoRolePx
            label: "Info: Role — Desktop (px)"
            type: number
          - name: infoRoleMobilePx
            label: "Info: Role — Mobile (px)"
            type: number
          - name: infoLeadPx
            label: "Info: Lead Line — Desktop (px)"
            type: number
          - name: infoLeadMobilePx
            label: "Info: Lead Line — Mobile (px)"
            type: number
          - name: infoBioPx
            label: "Info: Bio — Desktop (px)"
            type: number
          - name: infoBioMobilePx
            label: "Info: Bio — Mobile (px)"
            type: number

          # ── Contact Section ───────────────────────────────
          - name: contactTitlePx
            label: "Contact: Title — Desktop (px)"
            type: number
          - name: contactTitleTabletPx
            label: "Contact: Title — Tablet (px)"
            type: number
          - name: contactTitleMobilePx
            label: "Contact: Title — Mobile (px)"
            type: number
          - name: contactDescriptionPx
            label: "Contact: Description — Desktop (px)"
            type: number
          - name: contactDescriptionTabletPx
            label: "Contact: Description — Tablet (px)"
            type: number
          - name: contactDescriptionMobilePx
            label: "Contact: Description — Mobile (px)"
            type: number
          - name: contactButtonPx
            label: "Contact: Button — Desktop (px)"
            type: number
          - name: contactButtonMobilePx
            label: "Contact: Button — Mobile (px)"
            type: number

          # ── Footer ────────────────────────────────────────
          - name: footerPx
            label: "Footer — Desktop (px)"
            type: number
          - name: footerMobilePx
            label: "Footer — Mobile (px)"
            type: number
      - name: visibility
        label: Section Visibility
        type: object
        fields:
          - name: hero
            label: Show Hero Section
            type: boolean
          - name: work
            label: Show Work Section
            type: boolean
          - name: updates
            label: Show News & Updates Section
            type: boolean
          - name: info
            label: Show Info Section
            type: boolean
          - name: operatingModel
            label: "Info: Show Operating Model"
            type: boolean
          - name: focusAreas
            label: "Info: Show Focus Areas"
            type: boolean
          - name: speaking
            label: "Info: Show Speaking & Mentorship"
            type: boolean
          - name: contact
            label: Show Contact Section
            type: boolean

      - name: footer
        label: Footer
        type: object
        fields:
          - name: footerCopyright
            label: Copyright Name
            type: string
            description: "e.g. TOMI ABE STUDIO"
          - name: footerTagline
            label: Tagline
            type: string
            description: "e.g. Objectivity · Clarity · Precision"
      - name: layout
        label: Layout
        type: object
        fields:
          - name: siteMaxWidth
            label: Max Site Width (px)
            type: number
            description: "Controls the maximum width of the site on desktop. e.g. 1100, 1280, 1400"
          - name: workItemsPerPage
            label: Work Threshold
            type: number
          - name: updatesItemsPerPage
            label: Updates Threshold
            type: number
      - name: clock
        label: Clock
        type: object
        fields:
          - name: locale
            label: Locale
            type: string
          - name: hour12
            label: 12-hour
            type: boolean
          - name: timezone
            label: Timezone Name
            type: string
      - name: uiLabels
        label: UI Translations
        type: object
        fields:
          - { name: loadMore, label: Load More, type: string }
          - { name: showLess, label: Show Less, type: string }
          - { name: backToTop, label: Back to Top, type: string }
          - { name: visitProject, label: Visit Project, type: string }
          - { name: discussProject, label: Discuss Project, type: string }
          - { name: filterLabel, label: Filter Menu, type: string }
          - { name: filterByLabel, label: Filter Category, type: string }
          - { name: sidebarEnvironment, label: Mode Tab, type: string }
          - { name: sidebarVisuals, label: Visuals Tab, type: string }
          - { name: sidebarLayout, label: Layout Tab, type: string }
          - { name: sidebarAcoustics, label: Sound Tab, type: string }
          - { name: sidebarNetwork, label: Network Tab, type: string }
      - name: gridSettings
        label: Grid Overlay
        type: object
        fields:
          - name: variant
            label: Grid Style
            type: select
            options:
              values:
                - { value: b, label: Spotlight }
                - { value: off, label: Off }
          - name: enabled
            label: Show Grid
            type: boolean
          - name: opacity
            label: Grid Opacity
            type: number
            options:
              min: 0
              max: 100
              step: 5
